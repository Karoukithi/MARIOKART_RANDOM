<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-title" content="MARIOKART RANDOM">
    
    <link rel="apple-touch-icon" href="マリオ画像/アイコン/アプリアイコン.png?v=20260306">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>Mario Kart Roulette Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="app-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>

        <h1 class="title">
            <span class="title-mario">MARIO KART</span>
            <span class="title-roulette">RANDOM ROULETTE</span>
        </h1>

        <div class="settings-menu">
            <div class="menu-item" onclick="openModal('charModal')">
                <img src="マリオ画像/アイコン/人物ボタン.png" alt="キャラ設定">
                <span>キャラ管理</span>
            </div>
            <div class="menu-item" onclick="openModal('machineModal')">
                <img src="マリオ画像/アイコン/バイクアイコン.png" alt="マシン設定">
                <span>マシン管理</span>
            </div>
            <div class="menu-item" onclick="openModal('appSettingsModal')">
                <img src="マリオ画像/アイコン/スパナ.png" alt="アプリ設定">
                <span>動作設定</span>
            </div>
        </div>

        <div class="result">
            <div class="box character-box">
                <div id="charName" class="name-display">？</div>
                <div class="img-frame" id="charFrame">
                    <div id="charPlaceholder" class="placeholder">？</div>
                    <img id="charImg" src="" alt="キャラクター" style="display:none;">
                </div>
                <button class="spin-btn" onclick="spinCharacter()">RANDOM</button>
            </div>

            <div class="box machine-box">
                <div id="machineName" class="name-display">？</div>
                <div class="img-frame" id="machineFrame">
                    <div id="machinePlaceholder" class="placeholder">？</div>
                    <img id="machineImg" src="" alt="マシン" style="display:none;">
                </div>
                <button class="spin-btn" onclick="spinMachine()">RANDOM</button>
            </div>
        </div>

        <button class="all-btn" onclick="spinAll()">ALL RANDOM START!</button>
    </div>

    <div id="charModal" class="modal">
        <div class="modal-content">
            <h2>持っているキャラを選択</h2>
            <div id="charList" class="selection-grid"></div>
            <button class="close-btn" onclick="closeModal('charModal')">設定完了</button>
        </div>
    </div>

    <div id="machineModal" class="modal">
        <div class="modal-content">
            <h2>持っているマシンを選択</h2>
            <div id="machineList" class="selection-grid"></div>
            <button class="close-btn" onclick="closeModal('machineModal')">設定完了</button>
        </div>
    </div>

    <div id="appSettingsModal" class="modal">
        <div class="modal-content">
            <h2>アプリ動作設定</h2>
            <div class="config-item">
                <label>演出をカットする</label>
                <input type="checkbox" id="skipAnimation">
            </div>
            <div class="config-item">
                <label>ルーレット時間: <span id="timeValue">2.0</span>秒</label>
                <input type="range" id="rouletteTime" min="0.5" max="5.0" step="0.5" value="2.0">
            </div>
            <button class="close-btn" onclick="closeModal('appSettingsModal')">保存して閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
